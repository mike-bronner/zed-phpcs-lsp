id = "phpcs"
name = "PHPCS"
version = "0.4.3"
schema_version = 1
authors = ["Mike Bronner <mike.bronner@icloud.com>"]
description = "PHP CodeSniffer Language Server for linting, formatting, and auto-fixing PHP code via PHPCS and PHPCBF."
repository = "https://github.com/mike-bronner/zed-phpcs-lsp"

[lib]
kind = "Rust"
version = "0.4.3"

[language_servers.phpcs]
name = "PHPCS"
languages = ["PHP"]
language_ids = { PHP = "php" }
